<style>
:root {
    --card-bg-pastel: rgba(255, 255, 255, 0.45);
    --text-main-pastel: #2d1b4e;
    --text-muted-pastel: #624b7a;
    --border-pastel: rgba(255, 255, 255, 0.5);
    --glow-pastel: rgba(255, 117, 140, 0.2);
    --gradient-body-pastel: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
    --gradient-accent-pastel: linear-gradient(90deg, #ff758c, #ff7eb3, #8ec5fc);

    /* Cosmic Theme */
    --card-bg-cosmic: rgba(26, 11, 46, 0.7);
    --text-main-cosmic: #f3e8ff;
    --text-muted-cosmic: #c084fc;
    --border-cosmic: rgba(142, 68, 173, 0.4);
    --glow-cosmic: rgba(192, 132, 252, 0.35);
    --gradient-body-cosmic: linear-gradient(135deg, #2e0854 0%, #110022 100%);
    --gradient-accent-cosmic: linear-gradient(90deg, #a855f7, #ec4899, #6366f1);

    /* Rose Gold Theme */
    --card-bg-rose: rgba(255, 244, 245, 0.65);
    --text-main-rose: #4a2834;
    --text-muted-rose: #a26b7c;
    --border-rose: rgba(255, 182, 193, 0.5);
    --glow-rose: rgba(224, 141, 157, 0.3);
    --gradient-body-rose: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
    --gradient-accent-rose: linear-gradient(90deg, #fb6f92, #ff8fab, #ffe5ec);

    /* Deep Dark Theme */
    --card-bg-dark: rgba(15, 23, 42, 0.8);
    --text-main-dark: #f8fafc;
    --text-muted-dark: #94a3b8;
    --border-dark: rgba(255, 255, 255, 0.1);
    --glow-dark: rgba(59, 130, 246, 0.2);
    --gradient-body-dark: linear-gradient(135deg, #0f172a 0%, #020617 100%);
    --gradient-accent-dark: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);

    /* Mappings */
    --card-bg: var(--card-bg-pastel);
    --text-main: var(--text-main-pastel);
    --text-muted: var(--text-muted-pastel);
    --border-color: var(--border-pastel);
    --glow-shadow: var(--glow-pastel);
    --body-bg: var(--gradient-body-pastel);
    --accent-gradient: var(--gradient-accent-pastel);
}

body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--text-main);
    background: var(--body-bg);
    transition: background 0.8s cubic-bezier(0.25, 1, 0.5, 1), color 0.5s ease;
}

/* Glassmorphism Styling */
.perspective-card-wrapper {
    perspective: 1500px;
}

.experience-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px) saturate(190%);
    -webkit-backdrop-filter: blur(20px) saturate(190%);
    border: 1px solid var(--border-color);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), 
                inset 0 0 1px 1px rgba(255, 255, 255, 0.2);
    transition: border-color 0.5s ease, background 0.5s ease, transform 0.1s ease-out;
    transform-style: preserve-3d;
}

/* Animations and Progressive Fills */
.progress-fill {
    background: var(--accent-gradient);
    background-size: 200% auto;
    animation: shineProgress 4s linear infinite;
}

@keyframes shineProgress {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 200% 50%; }
}

.poem-display {
    font-family: 'Caveat', cursive;
}

.pulse-gently {
    animation: pulse-glow 3s infinite alternate;
}

@keyframes pulse-glow {
    0% { transform: scale(1); box-shadow: 0 0 5px rgba(255,255,255,0.1); }
    100% { transform: scale(1.02); box-shadow: 0 0 20px var(--glow-shadow); }
}

/* Custom Scrollbar for inner boxes */
.custom-scrollbar::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
.custom-scrollbar::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
    border-radius: 99px;
}
.custom-scrollbar::-webkit-scrollbar-thumb {
    background: var(--text-muted);
    opacity: 0.5;
    border-radius: 99px;
}

.typewriter-cursor::after {
    content: '|';
    animation: blinkCursor 0.8s infinite;
}
@keyframes blinkCursor {
    50% { opacity: 0; }
}

.balloon-hover:hover {
    transform: scale(1.15) translateY(-8px);
}

@media (prefers-reduced-motion: reduce) {
    * {
        animation-delay: 0s !important;
        animation-duration: 0s !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0s !important;
        scroll-behavior: auto !important;
    }
}
</style>

<script>
class SoundSynthesizer {
    constructor() {
        this.ctx = null;
        this.enabled = false;
        this.bgmInterval = null;
    }

    init() {
        if (!this.ctx) {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContextClass();
        }
        this.enabled = true;
        if (this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    }

    disable() {
        this.enabled = false;
    }

    playTone(frequency, duration, type = 'sine', volume = 0.1) {
        if (!this.enabled || !this.ctx) return;
        
        try {
            const osc = this.ctx.createOscillator();
            const gainNode = this.ctx.createGain();

            osc.type = type;
            osc.frequency.value = frequency;

            gainNode.gain.setValueAtTime(0, this.ctx.currentTime);
            gainNode.gain.linearRampToValueAtTime(volume, this.ctx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, this.ctx.currentTime + duration);

            osc.connect(gainNode);
            gainNode.connect(this.ctx.destination);

            osc.start(this.ctx.currentTime);
            osc.stop(this.ctx.currentTime + duration);
        } catch (e) {
            console.warn("Synthesizer playback issue:", e);
        }
    }

    playUnlockSound() {
        this.playTone(349.23, 0.4, 'triangle', 0.08); // F4
        setTimeout(() => this.playTone(523.25, 0.5, 'sine', 0.12), 100); // C5
        setTimeout(() => this.playTone(698.46, 0.6, 'sine', 0.15), 200); // F5
    }

    playPopSound() {
        if (!this.enabled || !this.ctx) return;
        try {
            const osc = this.ctx.createOscillator();
            const gainNode = this.ctx.createGain();
            
            osc.frequency.setValueAtTime(300, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.12);
            
            gainNode.gain.setValueAtTime(0.15, this.ctx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.12);
            
            osc.connect(gainNode);
            gainNode.connect(this.ctx.destination);
            
            osc.start();
            osc.stop(this.ctx.currentTime + 0.12);
        } catch(e) {}
    }

    playArpeggio() {
        const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; // C Major arpeggio
        notes.forEach((freq, index) => {
            setTimeout(() => {
                this.playTone(freq, 0.45, 'sine', 0.07);
            }, index * 90);
        });
    }

    playBGMChords() {
        if (!this.enabled || !this.ctx) return;
        this.stopBGM();

        const progression = [
            [174.61, 220.00, 261.63], // F3 A3 C4
            [261.63, 329.63, 392.00], // C4 E4 G4
            [196.00, 246.94, 293.66], // G3 B3 D4
            [220.00, 261.63, 329.63]  // A3 C4 E4
        ];
        
        let bar = 0;
        this.bgmInterval = setInterval(() => {
            if (!this.enabled) return;
            const chords = progression[bar % progression.length];
            chords.forEach(note => {
                this.playTone(note, 2.8, 'triangle', 0.03);
            });
            bar++;
        }, 3000);
    }

    stopBGM() {
        if (this.bgmInterval) {
            clearInterval(this.bgmInterval);
            this.bgmInterval = null;
        }
    }
}

const AudioController = new SoundSynthesizer();
</script>

<script>
class CanvasAmbientEngine {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.fireworks = [];
        this.active = true;
        this.isFinale = false;
        this.pool = ['🌸', '✨', '💖', '🎈', '🍰', '⭐'];
        
        this.resize = this.resize.bind(this);
        this.loop = this.loop.bind(this);
        
        window.addEventListener('resize', this.resize);
        this.resize();
        this.initAmbient();
    }

    resize() {
        // High-DPI Display Scaling Correction
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = window.innerWidth * dpr;
        this.canvas.height = window.innerHeight * dpr;
        this.ctx.scale(dpr, dpr);
        
        // Match responsive dimensions
        this.canvasWidth = window.innerWidth;
        this.canvasHeight = window.innerHeight;
    }

    initAmbient() {
        this.particles = [];
        // Device adaptive counts to maximize battery life on mobile
        const maxParticles = this.canvasWidth < 640 ? 12 : 24;
        for (let i = 0; i < maxParticles; i++) {
            this.particles.push(this.createParticle(true));
        }
    }

    createParticle(isAmbient = false) {
        return {
            x: Math.random() * this.canvasWidth,
            y: isAmbient ? Math.random() * this.canvasHeight : this.canvasHeight + 20,
            char: this.pool[Math.floor(Math.random() * this.pool.length)],
            size: Math.random() * 8 + (this.canvasWidth < 640 ? 10 : 14),
            speedX: (Math.random() - 0.5) * 0.6,
            speedY: -(Math.random() * 0.4 + 0.2),
            alpha: Math.random() * 0.6 + 0.3,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.015
        };
    }

    spawnExplosion(x, y, emoji, count = 16) {
        if (ExperienceState.reducedMotion) return;
        // Limit on mobile for render efficiency
        const particleCount = this.canvasWidth < 640 ? Math.min(12, count) : count;
        
        for (let i = 0; i < particleCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const force = Math.random() * 3 + 1.5;
            this.fireworks.push({
                x: x,
                y: y,
                char: emoji,
                size: Math.random() * 10 + 10,
                speedX: Math.cos(angle) * force,
                speedY: Math.sin(angle) * force,
                alpha: 1,
                decay: Math.random() * 0.025 + 0.015,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.05
            });
        }
    }

    updateAndDraw() {
        this.ctx.clearRect(0, 0, this.canvasWidth, this.canvasHeight);

        // Ambient System Rendering
        this.particles.forEach((p, idx) => {
            p.y += p.speedY;
            p.x += p.speedX;
            p.rotation += p.rotSpeed;

            if (p.y < -20) {
                this.particles[idx] = this.createParticle(false);
            }

            this.ctx.save();
            this.ctx.globalAlpha = p.alpha;
            this.ctx.translate(p.x, p.y);
            this.ctx.rotate(p.rotation);
            this.ctx.font = `${p.size}px serif`;
            this.ctx.fillText(p.char, 0, 0);
            this.ctx.restore();
        });

        // Firework System Rendering
        for (let i = this.fireworks.length - 1; i >= 0; i--) {
            const f = this.fireworks[i];
            f.x += f.speedX;
            f.y += f.speedY;
            f.speedY += 0.05; // gravity
            f.alpha -= f.decay;
            f.rotation += f.rotSpeed;

            if (f.alpha <= 0) {
                this.fireworks.splice(i, 1);
                continue;
            }

            this.ctx.save();
            this.ctx.globalAlpha = Math.max(0, f.alpha);
            this.ctx.translate(f.x, f.y);
            this.ctx.rotate(f.rotation);
            this.ctx.font = `${f.size}px serif`;
            this.ctx.fillText(f.char, 0, 0);
            this.ctx.restore();
        }
    }

    loop() {
        if (!this.active) return;
        this.updateAndDraw();
        requestAnimationFrame(this.loop);
    }

    destroy() {
        this.active = false;
        window.removeEventListener('resize', this.resize);
    }
}

let AmbientEngineInstance;
window.addEventListener('load', () => {
    AmbientEngineInstance = new CanvasAmbientEngine('canvas-ambient');
    AmbientEngineInstance.loop();
});
</script>

<script>
class TypewriterEngine {
    constructor() {
        this.timer = null;
        this.isRunning = false;
    }

    type(element, htmlContent, onComplete) {
        this.cancel();
        
        if (!ExperienceState.typewriterEnabled || ExperienceState.reducedMotion) {
            element.innerHTML = htmlContent;
            if (onComplete) onComplete();
            return;
        }

        this.isRunning = true;
        const temp = document.createElement('div');
        temp.innerHTML = htmlContent;
        
        const nodes = Array.from(temp.childNodes);
        element.innerHTML = '';
        element.classList.add('typewriter-cursor');

        let nodeIndex = 0;
        let charIndex = 0;
        let currentContainer = element;

        const write = () => {
            if (nodeIndex >= nodes.length) {
                this.cancel();
                element.classList.remove('typewriter-cursor');
                if (onComplete) onComplete();
                return;
            }

            const currentNode = nodes[nodeIndex];

            if (currentNode.nodeType === Node.TEXT_NODE) {
                if (charIndex === 0) {
                    const textSpan = document.createElement('span');
                    currentContainer.appendChild(textSpan);
                    this.textDest = textSpan;
                }
                
                this.textDest.textContent += currentNode.textContent.charAt(charIndex);
                charIndex++;

                if (charIndex >= currentNode.textContent.length) {
                    nodeIndex++;
                    charIndex = 0;
                }
            } else if (currentNode.nodeType === Node.ELEMENT_NODE) {
                const elementClone = currentNode.cloneNode(false);
                elementClone.innerHTML = '';
                element.appendChild(elementClone);
                
                if (currentNode.childNodes.length > 0) {
                    const childNodes = Array.from(currentNode.childNodes);
                    let childCharIndex = 0;
                    let childNodeIndex = 0;
                    
                    const writeChild = () => {
                        if (childNodeIndex >= childNodes.length) {
                            nodeIndex++;
                            charIndex = 0;
                            this.timer = setTimeout(write, 20);
                            return;
                        }

                        const child = childNodes[childNodeIndex];
                        if (child.nodeType === Node.TEXT_NODE) {
                            elementClone.textContent += child.textContent.charAt(childCharIndex);
                            childCharIndex++;
                            if (childCharIndex >= child.textContent.length) {
                                childNodeIndex++;
                                childCharIndex = 0;
                            }
                        } else {
                            elementClone.appendChild(child.cloneNode(true));
                            childNodeIndex++;
                        }
                        this.timer = setTimeout(writeChild, 15);
                    };
                    writeChild();
                    return; 
                } else {
                    nodeIndex++;
                    charIndex = 0;
                }
            } else {
                nodeIndex++;
            }

            this.timer = setTimeout(write, 15);
        };

        write();
    }

    cancel() {
        if (this.timer) {
            clearTimeout(this.timer);
            this.timer = null;
        }
        this.isRunning = false;
    }
}

const TextWriter = new TypewriterEngine();
</script>

    nextBtn: document.getElementById('nextBtn'),
    themeMenuBtn: document.getElementById('themeMenuBtn'),
    themeDropdown: document.getElementById('themeDropdown'),
    bgmToggle: document.getElementById('bgmToggleBtn'),
    bgmIcon: document.getElementById('bgmIcon'),
    accDrawerBtn: document.getElementById('accDrawerBtn'),
    accDrawer: document.getElementById('accDrawer'),
    closeAcc: document.getElementById('closeAccBtn'),
    typewriterToggle: document.getElementById('typewriterToggle'),
    motionToggle: document.getElementById('reducedMotionToggle'),
    autoplayBtn: document.getElementById('autoplayBtn'),
    autoplayIcon: document.getElementById('autoplayIcon'),
    restartBtn: document.getElementById('restartBtn'),
    card: document.getElementById('master-card')
};

function setAestheticTheme(themeName) {
    ExperienceState.customTheme = themeName;
    ExperienceState.save();

    const root = document.documentElement;
    if (themeName === 'pastel') {
        root.style.setProperty('--card-bg', 'var(--card-bg-pastel)');
        root.style.setProperty('--text-main', 'var(--text-main-pastel)');
        root.style.setProperty('--text-muted', 'var(--text-muted-pastel)');
        root.style.setProperty('--border-color', 'var(--border-pastel)');
        root.style.setProperty('--glow-shadow', 'var(--glow-pastel)');
        root.style.setProperty('--body-bg', 'var(--gradient-body-pastel)');
        root.style.setProperty('--accent-gradient', 'var(--gradient-accent-pastel)');
    } else if (themeName === 'cosmic') {
        root.style.setProperty('--card-bg', 'var(--card-bg-cosmic)');
        root.style.setProperty('--text-main', 'var(--text-main-cosmic)');
        root.style.setProperty('--text-muted', 'var(--text-muted-cosmic)');
        root.style.setProperty('--border-color', 'var(--border-cosmic)');
        root.style.setProperty('--glow-shadow', 'var(--glow-cosmic)');
        root.style.setProperty('--body-bg', 'var(--gradient-body-cosmic)');
        root.style.setProperty('--accent-gradient', 'var(--gradient-accent-cosmic)');
    } else if (themeName === 'rose') {
        root.style.setProperty('--card-bg', 'var(--card-bg-rose)');
        root.style.setProperty('--text-main', 'var(--text-main-rose)');
        root.style.setProperty('--text-muted', 'var(--text-muted-rose)');
        root.style.setProperty('--border-color', 'var(--border-rose)');
        root.style.setProperty('--glow-shadow', 'var(--glow-rose)');
        root.style.setProperty('--body-bg', 'var(--gradient-body-rose)');
        root.style.setProperty('--accent-gradient', 'var(--gradient-accent-rose)');
    } else if (themeName === 'dark') {
        root.style.setProperty('--card-bg', 'var(--card-bg-dark)');
        root.style.setProperty('--text-main', 'var(--text-main-dark)');
        root.style.setProperty('--text-muted', 'var(--text-muted-dark)');
        root.style.setProperty('--border-color', 'var(--border-dark)');
        root.style.setProperty('--glow-shadow', 'var(--glow-dark)');
        root.style.setProperty('--body-bg', 'var(--gradient-body-dark)');
        root.style.setProperty('--accent-gradient', 'var(--gradient-accent-dark)');
    }
}

function showFeedbackNotification(msg, duration = 3000) {
    if (!DOM.feedback) return;
    DOM.feedback.innerText = msg;
    DOM.feedback.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
    DOM.feedback.classList.add('opacity-100', 'scale-100');
    
    if (DOM.feedbackTimeout) clearTimeout(DOM.feedbackTimeout);
    DOM.feedbackTimeout = setTimeout(() => {
        DOM.feedback.classList.remove('opacity-100', 'scale-100');
        DOM.feedback.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
    }, duration);
}

function updateProgressTracking() {
    const total = Object.keys(SlideBlueprint).length;
    let current = ExperienceState.currentStep;
    
    if (isNaN(current) || current < 1 || current > total) {
        current = 1;
        ExperienceState.currentStep = 1;
    }

    const percentage = Math.round((current / total) * 100);

    DOM.counter.innerText = `Step ${current} of ${total}`;
    DOM.completion.innerText = `${percentage}% Complete`;
    DOM.progress.style.width = `${percentage}%`;

    DOM.prevBtn.disabled = current === 1;
}

function renderStageSlide() {
    TextWriter.cancel();
    
    const total = Object.keys(SlideBlueprint).length;
    if (isNaN(ExperienceState.currentStep) || ExperienceState.currentStep < 1 || ExperienceState.currentStep > total) {
        ExperienceState.currentStep = 1;
    }

    const slide = SlideBlueprint[ExperienceState.currentStep];
    if (!slide) return;

    DOM.feedback.classList.remove('opacity-100', 'scale-100');
    DOM.feedback.classList.add('opacity-0', 'scale-95', 'pointer-events-none');

    // Build Fluid HTML Structure with optimized mobile padding and fonts
    const htmlString = `
        <h3 class="text-[9px] sm:text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-1" id="slideSubtitle">${slide.subtitle}</h3>
        <h2 class="text-xl sm:text-2xl md:text-3xl font-extrabold tracking-tight mb-4 sm:mb-6 bg-gradient-to-r from-pink-600 via-purple-600 to-indigo-600 bg-clip-text text-transparent leading-tight" id="slideTitle">${slide.title}</h2>
        <div class="mb-5 sm:mb-8 flex-grow flex flex-col justify-center w-full" id="slideMainContainer">
            ${slide.buildHtml()}
        </div>
        <div class="choices-wrapper flex flex-col sm:flex-row gap-2.5 sm:gap-3 justify-center max-w-md mx-auto w-full">
            <button id="choiceBtn1" class="btn-choice px-4 sm:px-6 py-2.5 sm:py-3.5 rounded-xl sm:rounded-2xl font-bold text-xs sm:text-sm bg-white/55 dark:bg-white/10 hover:bg-pink-500 hover:text-white border border-black/5 dark:border-white/10 shadow-sm hover:shadow-lg hover:shadow-pink-500/20 active:translate-y-0.5 transform sm:-translate-y-0.5 transition duration-200 focus:outline-none focus:ring-2 focus:ring-pink-500 flex-1">${slide.btn1}</button>
            <button id="choiceBtn2" class="btn-choice px-4 sm:px-6 py-2.5 sm:py-3.5 rounded-xl sm:rounded-2xl font-bold text-xs sm:text-sm bg-white/55 dark:bg-white/10 hover:bg-pink-500 hover:text-white border border-black/5 dark:border-white/10 shadow-sm hover:shadow-lg hover:shadow-pink-500/20 active:translate-y-0.5 transform sm:-translate-y-0.5 transition duration-200 focus:outline-none focus:ring-2 focus:ring-pink-500 flex-1">${slide.btn2}</button>
        </div>
    `;

    DOM.stage.style.opacity = '0.3';
    DOM.stage.style.transform = 'translateY(5px)';

    setTimeout(() => {
        DOM.stage.innerHTML = htmlString;
        updateProgressTracking();
        bindSlideInteractiveNodes();

        DOM.stage.style.opacity = '1';
        DOM.stage.style.transform = 'translateY(0)';
    }, 150);
}

function processNavigationChoice(choiceId) {
    if (ExperienceState.isProcessing) return;

    const total = Object.keys(SlideBlueprint).length;
    if (isNaN(ExperienceState.currentStep) || ExperienceState.currentStep < 1 || ExperienceState.currentStep > total) {
        ExperienceState.reset();
        renderStageSlide();
        return;
    }

    const slide = SlideBlueprint[ExperienceState.currentStep];
    if (!slide) return;

    ExperienceState.isProcessing = true;
    AudioController.playTone(440, 0.15, 'sine', 0.1);

    const feedbackMsg = choiceId === 1 ? slide.react1 : slide.react2;
    showFeedbackNotification(feedbackMsg);

    if (slide.onLeave) {
        slide.onLeave(choiceId);
    }

    // Dynamic celebration spawns based on step
    if (ExperienceState.currentStep === 1 && AmbientEngineInstance) {
        AmbientEngineInstance.spawnExplosion(window.innerWidth / 2, window.innerHeight / 2, '✨', 12);
    }
    if (ExperienceState.currentStep === 6 && choiceId === 1 && AmbientEngineInstance) {
        AmbientEngineInstance.spawnExplosion(window.innerWidth / 2, window.innerHeight / 2, '🎉', 20);
    }
    if (ExperienceState.currentStep === 11 && AmbientEngineInstance) {
        AmbientEngineInstance.spawnExplosion(window.innerWidth / 2, window.innerHeight / 2, '💖', 20);
    }

    if (ExperienceState.currentStep === 20) {
        if (choiceId === 1) {
            triggerGrandFinaleExplosions();
            ExperienceState.isProcessing = false;
            return;
        } else {
            ExperienceState.reset();
            setAestheticTheme('pastel');
            renderStageSlide();
            ExperienceState.isProcessing = false;
            return;
        }
    }

    // Modern progressive transitional timeout
    setTimeout(() => {
        ExperienceState.currentStep++;
        ExperienceState.save();
        renderStageSlide();
        ExperienceState.isProcessing = false;

        if (ExperienceState.currentStep === 20) {
            triggerGrandFinaleExplosions();
        }
    }, 1500);
}
</script>

<script>
function bindSlideInteractiveNodes() {
    const gift = document.getElementById('interactiveGiftBtn');
    if (gift) {
        gift.addEventListener('click', (e) => {
            AudioController.playUnlockSound();
            if (AmbientEngineInstance) {
                AmbientEngineInstance.spawnExplosion(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2, '🍬', 12);
            }
            showFeedbackNotification("🎁 Surprise! Click 'Step Inside' below to progress!");
        });
    }

    const vibeSlider = document.getElementById('vibeRangeSlider');
    const vibeLabel = document.getElementById('currentVibeValue');
    if (vibeSlider && vibeLabel) {
        vibeSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            vibeLabel.innerText = `${val} ${val > 8 ? '(Spectacular!)' : val > 5 ? '(Good Vibes)' : '(Chillin)'}`;
            AudioController.playTone(200 + (val * 30), 0.08, 'triangle', 0.06);
        });
    }

    const themePills = document.querySelectorAll('.theme-select-pill');
    themePills.forEach(pill => {
        pill.addEventListener('click', (e) => {
            const palette = e.target.getAttribute('data-palette');
            setAestheticTheme(palette);
            AudioController.playTone(523.25, 0.1, 'sine', 0.07);
            showFeedbackNotification(`Theme shifted to ${palette.toUpperCase()} dynamics!`);
        });
    });

    const balloon = document.getElementById('interactiveBalloon');
    if (balloon) {
        balloon.addEventListener('click', (e) => {
            AudioController.playPopSound();
            if (AmbientEngineInstance) {
                AmbientEngineInstance.spawnExplosion(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2, '🎈', 18);
                AmbientEngineInstance.spawnExplosion(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2, '✨', 8);
            }
            balloon.style.display = 'none';
            showFeedbackNotification("💥 POP! Good luck modifiers increased! Click below to advance.");
        });
    }

    const outputBox = document.getElementById('personalityOutputBox');
    if (outputBox) {
        outputBox.addEventListener('click', () => {
            AudioController.playTone(330, 0.25, 'sine', 0.08);
            outputBox.innerText = "Scanning fingerprint signature...";
            setTimeout(() => {
                const quotes = [
                    "A pure, kind, and brilliant mind detected.",
                    "Rare capability of elevating the room's energy instantly.",
                    "An incredible sense of aesthetic vision matched with loyalty.",
                    "100% capacity to make average moments highly memorable."
                ];
                outputBox.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                AudioController.playArpeggio();
            }, 1000);
        });
    }

    const eggs = document.querySelectorAll('.egg-bounce');
    eggs.forEach(egg => {
        egg.addEventListener('click', (e) => {
            AudioController.playTone(600, 0.1, 'triangle', 0.08);
            if (AmbientEngineInstance) {
                AmbientEngineInstance.spawnExplosion(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2, '⭐', 12);
            }
            egg.innerHTML = '✨';
            showFeedbackNotification("🥚 Tap! A critical hit of absolute happiness has been unlocked!");
        });
    });

    const jar = document.getElementById('interactiveJar');
    if (jar) {
        jar.addEventListener('click', (e) => {
            AudioController.playTone(523.25, 0.1, 'sine', 0.08);
            jar.classList.add('animate-ping');
            setTimeout(() => jar.classList.remove('animate-ping'), 400);
            if (AmbientEngineInstance) {
                AmbientEngineInstance.spawnExplosion(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2, '💖', 12);
            }
            showFeedbackNotification("💖 Preserved message: 'You are appreciated far more than you realize.'");
        });
    }

    const btn1 = document.getElementById('choiceBtn1');
    const btn2 = document.getElementById('choiceBtn2');
    if (btn1) btn1.addEventListener('click', () => processNavigationChoice(1));
    if (btn2) btn2.addEventListener('click', () => processNavigationChoice(2));
}

let finaleTimer = null;
function triggerGrandFinaleExplosions() {
    AudioController.playArpeggio();
    if (finaleTimer) clearInterval(finaleTimer);

    let count = 0;
    finaleTimer = setInterval(() => {
        if (ExperienceState.currentStep !== 20) {
            clearInterval(finaleTimer);
            return;
        }

        if (AmbientEngineInstance) {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * (window.innerHeight * 0.5);
            const emojis = ['💖', '✨', '🌸', '🎁', '🍰', '🌈', '🦄'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            AmbientEngineInstance.spawnExplosion(x, y, randomEmoji, 12);
            AudioController.playTone(300 + (Math.random() * 400), 0.2, 'sine', 0.04);
        }

        count++;
        if (count > 25) clearInterval(finaleTimer);
    }, 600);
}

function bindPlatformButtons() {
    DOM.prevBtn.addEventListener('click', () => {
        if (ExperienceState.currentStep > 1) {
            ExperienceState.currentStep--;
            ExperienceState.save();
            renderStageSlide();
        }
    });

    DOM.nextBtn.addEventListener('click', () => {
        const total = Object.keys(SlideBlueprint).length;
        if (ExperienceState.currentStep < total) {
            ExperienceState.currentStep++;
            ExperienceState.save();
            renderStageSlide();

            if (ExperienceState.currentStep === 20) {
                triggerGrandFinaleExplosions();
            }
        }
    });

    DOM.themeMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        DOM.themeDropdown.classList.toggle('hidden');
        DOM.themeDropdown.classList.toggle('flex');
    });

    document.addEventListener('click', () => {
        DOM.themeDropdown.classList.add('hidden');
        DOM.themeDropdown.classList.remove('flex');
    });

    const presetButtons = DOM.themeDropdown.querySelectorAll('[data-theme]');
    presetButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const preset = e.currentTarget.getAttribute('data-theme');
            setAestheticTheme(preset);
        });
    });

    DOM.bgmToggle.addEventListener('click', () => {
        AudioController.init();
        if (AudioController.enabled) {
            if (AudioController.bgmInterval) {
                AudioController.stopBGM();
                DOM.bgmIcon.className = "fa-solid fa-volume-xmark text-slate-400";
            } else {
                AudioController.playBGMChords();
                DOM.bgmIcon.className = "fa-solid fa-volume-high text-pink-600";
            }
        }
    });

    DOM.accDrawerBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        DOM.accDrawer.classList.toggle('hidden');
        DOM.accDrawer.classList.toggle('flex');
    });

    DOM.closeAcc.addEventListener('click', () => {
        DOM.accDrawer.classList.add('hidden');
        DOM.accDrawer.classList.remove('flex');
    });

    DOM.typewriterToggle.addEventListener('change', (e) => {
        ExperienceState.typewriterEnabled = e.target.checked;
        ExperienceState.save();
    });

    DOM.motionToggle.addEventListener('change', (e) => {
        ExperienceState.reducedMotion = e.target.checked;
        ExperienceState.save();
        if (AmbientEngineInstance) {
            AmbientEngineInstance.initAmbient();
        }
    });

    DOM.autoplayBtn.addEventListener('click', () => {
        ExperienceState.autoPlayActive = !ExperienceState.autoPlayActive;
        if (ExperienceState.autoPlayActive) {
            DOM.autoplayIcon.className = "fa-solid fa-circle-pause text-pink-600 animate-pulse";
            showFeedbackNotification("Story auto-play active. Sit back and enjoy!");
            
            ExperienceState.autoPlayTimer = setInterval(() => {
                const total = Object.keys(SlideBlueprint).length;
                if (ExperienceState.currentStep < total) {
                    ExperienceState.currentStep++;
                    ExperienceState.save();
                    renderStageSlide();
                } else {
                    clearInterval(ExperienceState.autoPlayTimer);
                    ExperienceState.autoPlayActive = false;
                    DOM.autoplayIcon.className = "fa-solid fa-circle-play text-pink-600";
                }
            }, 6000);
        } else {
            clearInterval(ExperienceState.autoPlayTimer);
            DOM.autoplayIcon.className = "fa-solid fa-circle-play text-pink-600";
            showFeedbackNotification("Auto-play paused.");
        }
    });

    DOM.restartBtn.addEventListener('click', () => {
        ExperienceState.reset();
        setAestheticTheme('pastel');
        renderStageSlide();
        showFeedbackNotification("Timeline restarted. Starting from Step 1.");
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'Right') {
            DOM.nextBtn.click();
        } else if (e.key === 'ArrowLeft' || e.key === 'Left') {
            DOM.prevBtn.click();
        } else if (e.key === ' ') {
            const btn = document.getElementById('choiceBtn1');
            if (btn) btn.click();
        }
    });

    // Dynamic 3D mouse card tilt (Desktop Only)
    const cardWrapper = document.querySelector('.perspective-card-wrapper');
    if (cardWrapper && !ExperienceState.reducedMotion) {
        cardWrapper.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 1024) return; // Skip on mobile/tablets
            const rect = cardWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const xc = rect.width / 2;
            const yc = rect.height / 2;
            const tiltX = (yc - y) / 16;
            const tiltY = (x - xc) / 16;

            DOM.card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        });

        cardWrapper.addEventListener('mouseleave', () => {
            DOM.card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });
    }

    // Fluid Mobile Swipe gesture helpers
    let touchstartX = 0;
    let touchendX = 0;
    
    document.addEventListener('touchstart', (e) => {
        touchstartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        touchendX = e.changedTouches[0].screenX;
        handleGesture();
    }, { passive: true });

    function handleGesture() {
        if (touchendX < touchstartX - 60) {
            DOM.nextBtn.click();
        }
        if (touchendX > touchstartX + 60) {
            DOM.prevBtn.click();
        }
    }
}

window.addEventListener('load', () => {
    setAestheticTheme(ExperienceState.customTheme);
    renderStageSlide();
    bindPlatformButtons();
});
</script>
</body>
</html>
